services:
  - type: web
    name: ai-dev-blog-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: oregon
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ADMIN_USERNAME
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: AUTO_SEED_ON_EMPTY
        value: "0"
      - key: ENABLE_STARTUP_SCHEMA_SYNC
        value: "0"
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: R2_ENDPOINT
        sync: false
      - key: R2_PUBLIC_BASE_URL
        sync: false
      - key: R2_REGION
        value: auto
      # 订阅通知相关变量不会从 GitHub Secret 自动同步到运行时；
      # 需要在 Render 后端服务环境变量中手动填写并重新部署。
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: WEB_PUSH_VAPID_PUBLIC_KEY
        sync: false
      - key: WEB_PUSH_VAPID_PRIVATE_KEY
        sync: false
      - key: WEB_PUSH_SUBJECT
        sync: false
      - key: WECOM_WEBHOOK_URLS
        sync: false
