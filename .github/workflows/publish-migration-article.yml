name: 发布架构迁移总结

on:
  push:
    branches:
      - master
    paths:
      - '.github/workflows/publish-migration-article.yml'
      - 'scripts/publish-content-file.mjs'
      - 'scripts/content/blog-migration-neon-r2.mjs'
  workflow_dispatch:
    inputs:
      article_file:
        description: 要发布的文章模块路径
        required: false
        default: './content/blog-migration-neon-r2.mjs'

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      # 安装 Node.js
      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'

      # 发布文章，并通过后台已配置的图片生成渠道生成封面。
      - name: 发布文章并生成封面
        working-directory: scripts
        env:
          ARTICLE_FILE: ${{ github.event.inputs.article_file || './content/blog-migration-neon-r2.mjs' }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
        run: node publish-content-file.mjs
