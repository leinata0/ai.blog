name: 系列封面补齐

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 仅演练，不写入系列封面
        required: false
        default: false
        type: boolean
      force:
        description: 即使已有封面也强制重生成
        required: false
        default: false
        type: boolean
      limit:
        description: 本次最多处理系列数量
        required: false
        default: '50'
        type: string
      offset:
        description: 从第几个系列开始
        required: false
        default: '0'
        type: string

permissions:
  contents: read

jobs:
  backfill-series-covers:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 20
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 安装脚本依赖
        run: cd scripts && npm install

      - name: 检查必要密钥
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::Missing ADMIN_PASSWORD"; exit 1; fi
          echo "Secrets look good."

      - name: 执行系列封面补齐
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_FORCE: ${{ inputs.force }}
          DISPATCH_LIMIT: ${{ inputs.limit }}
          DISPATCH_OFFSET: ${{ inputs.offset }}
        shell: bash
        run: |
          if [[ ! "$DISPATCH_LIMIT" =~ ^[1-9][0-9]{0,2}$ ]] || (( 10#$DISPATCH_LIMIT > 200 )); then
            echo "::error::limit must be an integer between 1 and 200"
            exit 1
          fi
          if [[ ! "$DISPATCH_OFFSET" =~ ^(0|[1-9][0-9]{0,6})$ ]] || (( 10#$DISPATCH_OFFSET > 1000000 )); then
            echo "::error::offset must be an integer between 0 and 1000000"
            exit 1
          fi

          args=(--limit "$DISPATCH_LIMIT" --offset "$DISPATCH_OFFSET")
          if [ "$DISPATCH_DRY_RUN" = "true" ]; then args+=(--dry-run); fi
          if [ "$DISPATCH_FORCE" = "true" ]; then args+=(--force); fi
          printf 'Running:'
          printf ' %q' node scripts/backfill-series-covers.mjs "${args[@]}"
          printf '\n'
          node scripts/backfill-series-covers.mjs "${args[@]}"
