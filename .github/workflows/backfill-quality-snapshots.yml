name: 质量快照补算

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 仅演练，不写入质量快照
        required: false
        default: false
        type: boolean
      force:
        description: 即使已有质量快照也强制重算
        required: false
        default: false
        type: boolean
      limit:
        description: 每页抓取文章数量
        required: false
        default: '50'
        type: string
      offset:
        description: 从第几篇开始分页处理
        required: false
        default: '0'
        type: string
      max_pages:
        description: 最多处理多少页
        required: false
        default: '20'
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 20
    steps:
      # 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v6

      # 安装 Node.js 运行环境
      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 安装脚本依赖
      - name: 安装脚本依赖
        run: cd scripts && npm install

      # 检查后台密码等必要密钥
      - name: 检查必要密钥
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::Missing ADMIN_PASSWORD"; exit 1; fi
          echo "Secrets look good."

      # 执行历史文章质量快照补算
      - name: 执行质量快照补算
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
        run: |
          ARGS="--limit=${{ inputs.limit }} --offset=${{ inputs.offset }} --max-pages=${{ inputs.max_pages }}"
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          echo "Running: node scripts/backfill-quality-snapshots.mjs $ARGS"
          node scripts/backfill-quality-snapshots.mjs $ARGS
