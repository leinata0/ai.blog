name: 质量快照补算

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 仅演练，不写入质量快照
        required: false
        default: false
        type: boolean
      force:
        description: 即使已有质量快照也强制重算
        required: false
        default: false
        type: boolean
      limit:
        description: 每页抓取文章数量
        required: false
        default: '50'
        type: string
      offset:
        description: 从第几篇开始分页处理
        required: false
        default: '0'
        type: string
      max_pages:
        description: 最多处理多少页
        required: false
        default: '20'
        type: string

permissions:
  contents: read

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 20
    steps:
      # 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v6

      # 安装 Node.js 运行环境
      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 安装脚本依赖
      - name: 安装脚本依赖
        run: cd scripts && npm install

      # 检查后台密码等必要密钥
      - name: 检查必要密钥
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::Missing ADMIN_PASSWORD"; exit 1; fi
          echo "Secrets look good."

      # 执行历史文章质量快照补算
      - name: 执行质量快照补算
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_FORCE: ${{ inputs.force }}
          DISPATCH_LIMIT: ${{ inputs.limit }}
          DISPATCH_OFFSET: ${{ inputs.offset }}
          DISPATCH_MAX_PAGES: ${{ inputs.max_pages }}
        shell: bash
        run: |
          if [[ ! "$DISPATCH_LIMIT" =~ ^[1-9][0-9]{0,2}$ ]] || (( 10#$DISPATCH_LIMIT > 200 )); then
            echo "::error::limit must be an integer between 1 and 200"
            exit 1
          fi
          if [[ ! "$DISPATCH_OFFSET" =~ ^(0|[1-9][0-9]{0,6})$ ]] || (( 10#$DISPATCH_OFFSET > 1000000 )); then
            echo "::error::offset must be an integer between 0 and 1000000"
            exit 1
          fi
          if [[ ! "$DISPATCH_MAX_PAGES" =~ ^[1-9][0-9]{0,2}$ ]] || (( 10#$DISPATCH_MAX_PAGES > 200 )); then
            echo "::error::max_pages must be an integer between 1 and 200"
            exit 1
          fi

          args=(--limit "$DISPATCH_LIMIT" --offset "$DISPATCH_OFFSET" --max-pages "$DISPATCH_MAX_PAGES")
          if [ "$DISPATCH_DRY_RUN" = "true" ]; then args+=(--dry-run); fi
          if [ "$DISPATCH_FORCE" = "true" ]; then args+=(--force); fi
          printf 'Running:'
          printf ' %q' node scripts/backfill-quality-snapshots.mjs "${args[@]}"
          printf '\n'
          node scripts/backfill-quality-snapshots.mjs "${args[@]}"
