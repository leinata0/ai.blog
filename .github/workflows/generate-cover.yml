name: 手动生成封面图

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: 需要更新封面的文章 ID
        required: true
        default: '6'
      cover_prompt:
        description: 可选，补充文章封面的内容线索；留空时完全根据文章生成
        required: false
        default: ''
      overwrite_existing_cover:
        description: 即使文章已有封面图也强制覆盖
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: generate-cover-${{ github.workflow }}-${{ github.event.inputs.post_id }}
  cancel-in-progress: false

jobs:
  generate-cover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v5

      # 安装 Node.js
      - name: 安装 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      # 安装脚本依赖
      - name: 安装脚本依赖
        run: npm ci
        working-directory: scripts

      # 检查必要密钥
      - name: 检查必要密钥
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::Missing ADMIN_PASSWORD"; exit 1; fi
          echo "Secrets look good."

      # 自动读取文章内容，由后端 V3 规划视觉方向并调用配置的生图 API 回写封面
      - name: 生成封面图并更新文章
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
          POST_ID: ${{ github.event.inputs.post_id }}
          COVER_PROMPT: ${{ github.event.inputs.cover_prompt }}
          OVERWRITE_EXISTING_COVER: ${{ github.event.inputs.overwrite_existing_cover }}
        run: node scripts/generate-cover-for-post.mjs
