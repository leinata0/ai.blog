name: 手动生成封面图

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: 需要更新封面的文章 ID
        required: true
        default: '6'
      cover_prompt:
        description: 可选，手动指定封面提示词；留空时自动根据文章内容生成
        required: false
        default: ''
      overwrite_existing_cover:
        description: 即使文章已有封面图也强制覆盖
        required: false
        default: false
        type: boolean

jobs:
  generate-cover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      # 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      # 安装 Node.js
      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 安装脚本依赖
      - name: 安装脚本依赖
        run: cd scripts && npm install

      # 检查必要密钥
      - name: 检查必要密钥
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::Missing ADMIN_PASSWORD"; exit 1; fi
          if [ -z "$XAI_API_KEY" ]; then echo "::error::Missing XAI_API_KEY"; exit 1; fi
          echo "Secrets look good."

      # 自动读取文章内容，生成提示词后调用 Grok 生图并回写封面
      - name: 生成封面图并更新文章
        env:
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_BASE_URL: ${{ vars.SILICONFLOW_BASE_URL }}
          SILICONFLOW_MODEL: ${{ vars.SILICONFLOW_MODEL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
          POST_ID: ${{ github.event.inputs.post_id }}
          COVER_PROMPT: ${{ github.event.inputs.cover_prompt }}
          OVERWRITE_EXISTING_COVER: ${{ github.event.inputs.overwrite_existing_cover }}
        run: node scripts/generate-cover-for-post.mjs
