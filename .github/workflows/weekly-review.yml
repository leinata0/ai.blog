name: AI Weekly Review

on:
  schedule:
    - cron: '30 2 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run without publishing
        required: false
        default: false
        type: boolean
      coverage_date:
        description: Coverage date in YYYY-MM-DD
        required: false
        default: ''
        type: string
      force:
        description: Ignore duplicate checks
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install script dependencies
        run: cd scripts && npm install

      - name: Check required secrets
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$SILICONFLOW_API_KEY" ]; then echo "::error::Missing SILICONFLOW_API_KEY"; exit 1; fi
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::Missing ADMIN_PASSWORD"; exit 1; fi
          echo "Secrets look good."

      - name: Generate weekly review
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_BASE_URL: ${{ vars.SILICONFLOW_BASE_URL }}
          SILICONFLOW_MODEL: ${{ vars.SILICONFLOW_MODEL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
        run: |
          ARGS="--mode weekly-review"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            if [ -n "${{ inputs.coverage_date }}" ]; then ARGS="$ARGS --coverage-date ${{ inputs.coverage_date }}"; fi
            if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          fi
          echo "Running: node scripts/auto-blog.mjs $ARGS"
          node scripts/auto-blog.mjs $ARGS
