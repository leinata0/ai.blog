name: AI 周报自动生成

on:
  schedule:
    - cron: '37 2 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 仅演练，不真正发布
        required: false
        default: false
        type: boolean
      coverage_date:
        description: 指定覆盖日期，格式 YYYY-MM-DD
        required: false
        default: ''
        type: string
      force:
        description: 忽略重复检查并强制生成
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: weekly-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 20
    steps:
      # 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v6

      # 安装 Node.js 运行环境
      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      # 安装脚本依赖
      - name: 安装脚本依赖
        run: npm ci
        working-directory: scripts

      # 检查周报生成所需密钥
      - name: 检查必要密钥
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::Missing ADMIN_PASSWORD"; exit 1; fi
          echo "Secrets look good."

      # 执行 AI 周报生成
      - name: 生成 AI 周报
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
        run: |
          ARGS="--mode weekly-review"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
            if [ -n "${{ inputs.coverage_date }}" ]; then ARGS="$ARGS --coverage-date ${{ inputs.coverage_date }}"; fi
            if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          fi
          echo "Running: node scripts/auto-blog.mjs $ARGS"
          node scripts/auto-blog.mjs $ARGS
