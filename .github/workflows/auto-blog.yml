name: AI 日报自动生成

on:
  # 每天 UTC 01:00（北京时间 09:00）自动运行
  schedule:
    - cron: '0 1 * * *'
  # 手动触发（方便测试）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    # 消除「Node.js 20 actions deprecated」警告；与官方新版 Action 运行时一致
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 10
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 安装 Python（aread 搜索依赖）
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: 检查仓库机密（不输出具体值）
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$OPENROUTER_API_KEY" ]; then echo "::error::缺少 OPENROUTER_API_KEY，请在 Settings → Secrets → Actions 添加"; exit 1; fi
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::缺少 ADMIN_PASSWORD，请在仓库机密中添加"; exit 1; fi
          echo "机密已配置（已打码）"

      # 勿使用 | head：GitHub Actions 默认 pipefail，会导致 npx 侧 SIGPIPE 非零退出
      - name: 验证 aread（npx，与脚本一致）
        run: npx --yes aread-cli -h

      - name: 生成并发布 AI 日报
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: https://api.563118077.xyz
        run: node scripts/auto-blog.mjs
