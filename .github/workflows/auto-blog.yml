name: AI 日报自动发文

on:
  schedule:
    - cron: '7 2 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 仅演练，不真正发布
        required: false
        default: false
        type: boolean
      coverage_date:
        description: 指定覆盖日期，格式 YYYY-MM-DD
        required: false
        default: ''
        type: string
      max_posts:
        description: 手动覆盖本次生成篇数
        required: false
        default: ''
        type: string
      force:
        description: 忽略重复检查并强制生成
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: auto-blog-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # Daily pipeline: research + multi-topic LLM + quality repair + cover jobs.
    timeout-minutes: 60
    steps:
      # 拉取仓库代码
      - name: 拉取仓库代码
        uses: actions/checkout@v6

      # 安装 Node.js 运行环境
      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: scripts/package-lock.json

      # 安装脚本依赖
      - name: 安装脚本依赖
        run: npm ci
        working-directory: scripts

      # 检查自动发文所需密钥
      - name: 检查必要密钥
        env:
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::Missing ADMIN_PASSWORD"; exit 1; fi
          echo "Secrets look good."

      # 执行 AI 日报自动生成
      - name: 生成 AI 日报
        env:
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
          DISPATCH_DRY_RUN: ${{ inputs.dry_run }}
          DISPATCH_COVERAGE_DATE: ${{ inputs.coverage_date }}
          DISPATCH_MAX_POSTS: ${{ inputs.max_posts }}
          DISPATCH_FORCE: ${{ inputs.force }}
        shell: bash
        run: |
          args=(--mode daily-auto)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "$DISPATCH_COVERAGE_DATE" ]; then
              if [[ ! "$DISPATCH_COVERAGE_DATE" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}$ ]]; then
                echo "::error::coverage_date must use YYYY-MM-DD format"
                exit 1
              fi
              if ! normalized_date=$(date -u -d "$DISPATCH_COVERAGE_DATE" +%F 2>/dev/null) || [ "$normalized_date" != "$DISPATCH_COVERAGE_DATE" ]; then
                echo "::error::coverage_date must be a valid calendar date"
                exit 1
              fi
              args+=(--coverage-date "$DISPATCH_COVERAGE_DATE")
            fi
            if [ -n "$DISPATCH_MAX_POSTS" ]; then
              if [[ ! "$DISPATCH_MAX_POSTS" =~ ^([1-9]|1[0-9]|20)$ ]]; then
                echo "::error::max_posts must be an integer between 1 and 20"
                exit 1
              fi
              args+=(--max-posts "$DISPATCH_MAX_POSTS")
            fi
            if [ "$DISPATCH_DRY_RUN" = "true" ]; then args+=(--dry-run); fi
            if [ "$DISPATCH_FORCE" = "true" ]; then args+=(--force); fi
          fi
          printf 'Running:'
          printf ' %q' node scripts/auto-blog.mjs "${args[@]}"
          printf '\n'
          node scripts/auto-blog.mjs "${args[@]}"
