name: AI 日报自动生成

on:
  # 每天 UTC 01:00（北京时间 09:00）自动运行
  schedule:
    - cron: '0 1 * * *'
  # 手动触发（方便测试）
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    timeout-minutes: 15
    steps:
      - name: 拉取代码
        uses: actions/checkout@v6

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: 安装脚本依赖
        run: cd scripts && npm install

      - name: 检查仓库机密
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          if [ -z "$SILICONFLOW_API_KEY" ]; then echo "::error::请配置 SILICONFLOW_API_KEY"; exit 1; fi
          if [ -z "$ADMIN_PASSWORD" ]; then echo "::error::缺少 ADMIN_PASSWORD"; exit 1; fi
          echo "机密已配置"

      - name: 生成并发布 AI 日报
        env:
          SILICONFLOW_API_KEY: ${{ secrets.SILICONFLOW_API_KEY }}
          SILICONFLOW_BASE_URL: ${{ vars.SILICONFLOW_BASE_URL }}
          SILICONFLOW_MODEL: ${{ vars.SILICONFLOW_MODEL }}
          ADMIN_USERNAME: ${{ secrets.ADMIN_USERNAME }}
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
          BLOG_API_BASE: ${{ vars.BLOG_API_BASE }}
        run: node scripts/auto-blog.mjs
